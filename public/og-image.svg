<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="textG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.5" stop-color="#d946ef"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="blurLg">
      <feGaussianBlur stdDeviation="80" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#g)"/>

  <!-- Background decorative glowing orbs -->
  <circle cx="200" cy="150" r="250" fill="#8b5cf6" opacity="0.25" filter="url(#blurLg)" />
  <circle cx="1000" cy="500" r="300" fill="#06b6d4" opacity="0.25" filter="url(#blurLg)" />
  <circle cx="800" cy="100" r="200" fill="#d946ef" opacity="0.25" filter="url(#blurLg)" />

  <text x="120" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="900" fill="url(#textG)">
    Eyad Ayoub
  </text>
  <text x="120" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="600" fill="#f1f5f9">
    Cyber Security Engineer &amp; Penetration Tester
  </text>
  <text x="120" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#94a3b8">
    @Tensi4 • Web • Mobile • API • Network
  </text>

  <g transform="translate(120 500)">
    <rect width="280" height="60" rx="16" fill="rgba(139, 92, 246, 0.2)" stroke="#8b5cf6" stroke-width="2"/>
    <text x="140" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#f1f5f9">PORTFOLIO</text>
  </g>
</svg>